name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Nuitka braucht patchelf fuer den --standalone-Build unter Linux
      - name: Install patchelf (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf

      # bootstrap (venv + Deps + Nuitka + Chromium) + compile (Nuitka-Build)
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./bootstrap.ps1
          ./compile-win64.ps1

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ./bootstrap.sh
          ./compile-linux.sh

      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ./bootstrap.sh
          ./compile-macos.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/visual-regression-scanner-v*.zip
            dist/visual-regression-scanner-v*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.zip
            *.tar.gz
